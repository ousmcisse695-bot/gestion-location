<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Location v1.0</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .cagnotte-style {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white; padding: 20px; border-radius: 15px;
            margin: 20px auto; width: 300px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        .card { background: white; padding: 15px; margin: 10px auto; width: 300px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Gestion de Location v1.0</h1>
    
    <div class="cagnotte-style">
        <h3>Solde accumulé</h3>
        <span id="cagnotte" style="font-size: 2rem; font-weight: bold;">0.00</span> DH
    </div>

    <button onclick="ajouterNouvelleLocation()">Ajouter une nouvelle location</button>
    
    <div id="liste-locations" style="margin-top: 20px;">
        </div>

    <script>
        const elementCagnotte = document.getElementById('cagnotte');
        const liste = document.getElementById('liste-locations');
        
        let monArgent = parseFloat(localStorage.getItem('portefeuille')) || 0;
        let mesAnnonces = JSON.parse(localStorage.getItem('mesAnnonces')) || [];

        // 1. Gérer la cagnotte
        setInterval(() => {
            monArgent += 0.05;
            elementCagnotte.innerText = monArgent.toFixed(2);
            localStorage.setItem('portefeuille', monArgent);
        }, 1000);

        // 2. Fonction pour ajouter une annonce
        function ajouterNouvelleLocation() {
            const nom = prompt("Nom de l'appartement ?");
            const prix = prompt("Prix par nuit ?");
            if (nom && prix) {
                const nouvelleAnnonce = { nom, prix };
                mesAnnonces.push(nouvelleAnnonce);
                localStorage.setItem('mesAnnonces', JSON.stringify(mesAnnonces));
                afficherAnnonces();
            }
        }

        // 3. Fonction pour afficher les annonces stockées
        function afficherAnnonces() {
            liste.innerHTML = "";
            mesAnnonces.forEach((annonce, index) => {
                liste.innerHTML += `
                    <div class="card">
                        <h3>${annonce.nom}</h3>
                        <p>Prix : ${annonce.prix} DH / nuit</p>
                        <button onclick="supprimer(${index})" style="background:#e74c3c">Supprimer</button>
                    </div>`;
            });
        }

        function supprimer(index) {
            mesAnnonces.splice(index, 1);
            localStorage.setItem('mesAnnonces', JSON.stringify(mesAnnonces));
            afficherAnnonces();
        }

        // Lancer l'affichage au démarrage
        afficherAnnonces();
    </script>
</body>
</html>
